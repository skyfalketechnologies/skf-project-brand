# Render Blueprint — optional one-click deploy
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: silvora-portfolio-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: silvora-portfolio-db
          property: connectionString
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

databases:
  - name: silvora-portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio
